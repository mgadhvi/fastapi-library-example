services:
  library-db:
    image: postgres:16-alpine
    container_name: library-db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mysecretpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - library-net
    restart: unless-stopped

  library-app:
    build: .
    container_name: library-app
    ports:
      - "80:8000"
    env_file:
      - .env
    depends_on:
      - library-db
    networks:
      - library-net
    restart: unless-stopped

networks:
  library-net:
    driver: bridge

volumes:
  pgdata:
